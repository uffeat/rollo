allow_embedding: true
db_schema:
  accounts:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: email
      type: string
    - admin_ui: {order: 1, width: 200}
      name: hashed_password
      type: string
    - admin_ui: {order: 2, width: 200}
      name: data
      type: simpleObject
    - admin_ui: {order: 3, width: 200}
      name: created
      type: datetime
    - admin_ui: {order: 4, width: 200}
      name: active
      type: bool
    - admin_ui: {order: 5, width: 200}
      name: log
      type: simpleObject
    server: full
    title: accounts
  actions:
    client: none
    columns:
    - admin_ui: {order: 0, width: 128}
      name: user
      target: users
      type: link_single
    - admin_ui: {order: 1, width: 158}
      name: key
      type: string
    - admin_ui: {order: 2, width: 168}
      name: timestamp
      type: datetime
    - admin_ui: {order: 3, width: 187}
      name: hashed_token
      type: string
    - admin_ui: {order: 4, width: 200}
      name: log
      type: simpleObject
    - admin_ui: {order: 3.5, width: 200}
      name: attempts
      type: number
    server: full
    title: actions
  assets:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: key
      type: string
    - admin_ui: {order: 1, width: 200}
      name: text
      type: string
    - admin_ui: {order: 2, width: 200}
      name: data
      type: simpleObject
    - admin_ui: {order: 3, width: 200}
      name: media
      type: simpleObject
    - admin_ui: {order: 4, width: 200}
      name: created
      type: datetime
    server: full
    title: assets
  log:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: created
      type: datetime
    - admin_ui: {order: 1, width: 200}
      name: data
      type: simpleObject
    - admin_ui: {order: 2, width: 200}
      name: media
      type: media
    server: full
    title: log
  states:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: id
      type: string
    - admin_ui: {order: 1, width: 200}
      name: created
      type: datetime
    - admin_ui: {order: 2, width: 200}
      name: private
      type: simpleObject
    - admin_ui: {order: 3, width: 200}
      name: public
      type: simpleObject
    server: full
    title: states
  test:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: text
      type: string
    - admin_ui: {order: 1, width: 200}
      name: number
      type: number
    - admin_ui: {order: 2, width: 200}
      name: boolean
      type: bool
    - admin_ui: {order: 3, width: 200}
      name: date
      type: date
    - admin_ui: {order: 4, width: 200}
      name: datetime
      type: datetime
    - admin_ui: {order: 5, width: 200}
      name: media
      type: media
    - admin_ui: {order: 6, width: 200}
      name: data
      type: simpleObject
    server: full
    title: test
  users:
    client: none
    columns:
    - admin_ui: {order: 0, width: 200}
      name: email
      type: string
    - admin_ui: {order: 1, width: 200}
      name: enabled
      type: bool
    - admin_ui: {order: 2, width: 200}
      name: last_login
      type: datetime
    - admin_ui: {order: 3, width: 200}
      name: password_hash
      type: string
    - admin_ui: {order: 4, width: 200}
      name: n_password_failures
      type: number
    - admin_ui: {order: 5, width: 200}
      name: confirmed_email
      type: bool
    - admin_ui: {order: 6, width: 200}
      name: signed_up
      type: datetime
    - admin_ui: {width: 200}
      name: email_confirmation_key
      type: string
    server: full
    title: Users
metadata: {description: rolloh, logo_img: 'https://rolloh.vercel.app/favicon.svg', title: Rolloh}
name: rolloh
native_deps: {head_html: '<link rel="stylesheet" href="https://rolloh.vercel.app/anvil/main.css" />'}
package_name: rolloh
runtime_options:
  client_version: '3'
  server_spec: {base: python310-standard}
  version: 3
scheduled_tasks: []
secrets: {}
services:
- client_config: {enable_v2: true}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {allow_signup: true, confirm_email: true, enable_automatically: true, use_email: true, use_google: true, use_token: true}
  server_config:
    email_content:
      confirm_address:
        html: |+
          <div style="font-size: 1rem">
            <p>Thanks for signing up. Please click the following link to confirm that this is your account:</p>
            <br />
            <p style="color: #0d6efd">{{confirm_link}}</p>
            <br />
            <p>Thanks.</p>
          </div>

        subject: Signup conformation
      reset_password:
        html: |+
          <div style="font-size: 1rem">
            <p>You have requested a password reset for your account {{email}}. To reset your password, please click the link:</p>
            <br />
            <p style="color: #0d6efd;">{{reset_link}}</p>
            <p >This link will expire in 10 minutes.</p>
            <br />
            <p>Thanks.</p>
          </div>



        subject: 'Password reset '
      token_login:
        html: |
          <div style="font-size: 1rem">
            <p>You have requested a login link for your account ({{email}}). To log in, please click the link:</p>
            <br />
            <p style="color: #0d6efd;">{{login_link}}</p>
            <p >This link will expire in 10 minutes.</p>
            <br />
            <p>Thanks.</p>
          </div>
        subject: Login link
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/google.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/email.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/secrets.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/stripe.yml
startup: {}
startup_form: null
uplink_visible: true
