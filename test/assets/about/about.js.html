<template>
  <script type="module">
    export default async (node) => {
      await use("@/bootstrap/");
      const { component } = await use("@/rollo/");
      node.append(
        component.div(
          "alert alert-danger alert-dismissible",
          { role: "alert" },
          component.div({ text: "Injected" }),
          component.button("btn-close", {
            type: "button",
            ariaLabel: "Close",
            "data.bsDismiss": "alert",
          }),
        ),
      );
    };
  </script>
</template>
