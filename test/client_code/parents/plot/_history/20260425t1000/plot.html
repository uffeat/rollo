<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <base href="https://rolloh.vercel.app" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/anvil/main.css" />
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon" />
    <title>Plot</title>
    <style>
      iframe {
        height: var(--height, 0);
        width: 100%;
      }
    </style>
    <script type="module">

      console.dir(location)

      // :TODO Read test from search
     

      const { setup } = await import(
        `${origin}/test/client_code/parents/tools.js`
      );

      const { default: use } = await import(`/anvil/use.js`);
      const { component, is } = await use("@/rollo/");
      const { frame } = await use("@/frame/");

      const data = [
        {
          Scatter: {
            name: "Wonder Land",
            x: [2019, 2020, 2021, 2022, 2023],
            y: [510, 620, 687, 745, 881],
          },
        },
      ];

      const iframe = component.iframe({
        parent: frame,
        name: "iframe",
        src: `${use.meta.server.origin}/plot?data=${JSON.stringify(data)}&test=true`,
        //src: `${use.meta.server.origin}/plot?data=${btoa(JSON.stringify(data))}&test=true`,
      });

      await setup(iframe)

      
    </script>
  </head>
  <body></body>
</html>
